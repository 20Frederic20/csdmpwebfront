<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CSDMP - Connexion</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface": "#f8faf9",
              "on-error-container": "#93000a",
              "secondary-fixed-dim": "#b4cad6",
              "on-tertiary-fixed": "#400106",
              "surface-container-highest": "#e1e3e2",
              "primary": "#00694a",
              "surface-container-high": "#e6e9e8",
              "secondary-container": "#cfe6f2",
              "on-secondary-container": "#526772",
              "on-secondary-fixed": "#071e27",
              "error-container": "#ffdad6",
              "surface-container-lowest": "#ffffff",
              "on-surface-variant": "#3e4943",
              "on-tertiary": "#ffffff",
              "primary-fixed": "#90f6c8",
              "surface-dim": "#d8dada",
              "on-primary-fixed": "#002114",
              "on-primary-container": "#f5fff7",
              "on-tertiary-container": "#fffbff",
              "on-primary-fixed-variant": "#005138",
              "on-background": "#191c1c",
              "surface-container-low": "#f2f4f3",
              "outline": "#6e7a72",
              "inverse-on-surface": "#eff1f0",
              "surface-bright": "#f8faf9",
              "tertiary-container": "#b55856",
              "tertiary": "#97413f",
              "on-secondary": "#ffffff",
              "inverse-primary": "#74daad",
              "inverse-surface": "#2e3131",
              "tertiary-fixed-dim": "#ffb3af",
              "tertiary-fixed": "#ffdad7",
              "on-error": "#ffffff",
              "on-surface": "#191c1c",
              "surface-variant": "#e1e3e2",
              "on-secondary-fixed-variant": "#354a53",
              "surface-container": "#eceeed",
              "surface-tint": "#006c4c",
              "secondary-fixed": "#cfe6f2",
              "primary-fixed-dim": "#74daad",
              "outline-variant": "#bdcac1",
              "on-tertiary-fixed-variant": "#7b2c2c",
              "on-primary": "#ffffff",
              "background": "#f8faf9",
              "secondary": "#4c616c",
              "primary-container": "#07855e",
              "error": "#ba1a1a"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        backdrop-filter: blur(24px);
        background-color: rgba(248, 250, 249, 0.8);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background font-body text-on-background min-h-screen flex flex-col">
<main class="flex-grow flex flex-col items-center justify-center px-6 py-8 sm:py-12">
<div class="w-full max-w-sm flex flex-col items-center">
<div class="mb-8 sm:mb-12 text-center">
<div class="mb-4 inline-flex items-center justify-center w-16 h-16 rounded-xl bg-primary-container/10">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="medical_services">medical_services</span>
</div>
<h1 class="font-headline font-extrabold text-3xl text-primary tracking-tight">CSDMP</h1>
</div>
<div class="w-full bg-surface-container-low rounded-3xl p-6 sm:p-8 space-y-8">
<div class="space-y-2">
<h2 class="font-headline font-bold text-3xl text-on-background">Bienvenue</h2>
<p class="text-on-surface-variant text-sm">Veuillez vous identifier pour accéder à votre espace.</p>
</div>
<form class="space-y-6">
<div class="space-y-2">
<label class="font-label text-[0.6875rem] font-bold uppercase tracking-wider text-on-surface-variant ml-1" for="npi">NPI (Identifiant National de Patient)</label>
<div class="relative">
<input autocomplete="username" class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 placeholder:text-outline/50" id="npi" placeholder="ex: 1234567890" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="font-label text-[0.6875rem] font-bold uppercase tracking-wider text-on-surface-variant ml-1" for="password">Mot de passe</label>
<div class="relative">
<input autocomplete="current-password" class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 placeholder:text-outline/50" id="password" placeholder="••••••••" type="password"/>
<button aria-label="Afficher le mot de passe" class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors p-1 flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="flex justify-end">
<a class="text-xs font-semibold text-primary hover:underline transition-all" href="#">Mot de passe oublié ?</a>
</div>
<button class="w-full bg-primary text-on-primary font-headline font-bold py-4 rounded-lg shadow-[0_4px_12px_rgba(0,105,74,0.2)] active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 group" type="submit">
                        Se connecter
                        <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="pt-4 text-center">
<p class="text-sm text-on-surface-variant">
                        Nouveau patient ? 
                        <a class="font-bold text-primary ml-1 hover:underline" href="#">Créer un compte</a>
</p>
</div>
</div>
<div class="mt-8 sm:mt-12 flex items-center gap-2 opacity-40">
<span class="material-symbols-outlined text-sm" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
<span class="text-[10px] font-label uppercase tracking-widest font-bold">Système de Santé Sécurisé</span>
</div>
</div>
</main>
<div aria-hidden="true" class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute top-1/2 -right-24 w-64 h-64 bg-secondary/5 rounded-full blur-3xl"></div>
</div>
</body></html>
